<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handball Planner - Générateur de Séances</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1>🏐 Handball Planner</h1>
        <p class="subtitle">Générateur intelligent de séances d'entraînement</p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Form Section -->
      <section class="form-section">
        <div class="form-card">
          <h2>Configuration de votre séance</h2>
          
          <div class="form-group">
            <label for="theme">🎯 Thème de la séance</label>
            <textarea 
              id="theme" 
              rows="3" 
              placeholder="Ex: grand espace et montée de balle, défense 1-5, duels 1c1, tir en course..."
              class="textarea-input"
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="categorie">👥 Catégorie</label>
              <select id="categorie" class="select-input">
                <option value="Babyhand">Babyhand</option>
                <option value="U9">U9</option>
                <option value="U11">U11</option>
                <option value="U13">U13</option>
                <option value="U15">U15</option>
                <option value="U18">U18</option>
                <option value="Seniors">Seniors</option>
              </select>
            </div>

            <div class="form-group">
              <label for="niveau">📊 Niveau</label>
              <select id="niveau" class="select-input">
                <option value="Débutant">Débutant</option>
                <option value="Intermédiaire">Intermédiaire</option>
                <option value="Confirmé">Confirmé</option>
                <option value="Performance">Performance</option>
                <option value="Pro">Pro</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="duree">⏱️ Durée (min)</label>
              <input 
                type="number" 
                id="duree" 
                value="90" 
                min="60" 
                max="120"
                class="number-input"
              >
            </div>

            <div class="form-group">
              <label for="joueurs">👕 Joueurs</label>
              <input 
                type="number" 
                id="joueurs" 
                value="12" 
                min="4" 
                max="20"
                class="number-input"
              >
            </div>

            <div class="form-group">
              <label for="gardiens">🧤 Gardiens</label>
              <input 
                type="number" 
                id="gardiens" 
                value="1" 
                min="0" 
                max="4"
                class="number-input"
              >
            </div>
          </div>

          <button onclick="genererSeance()" class="btn-generate">
            ✨ Générer la séance
          </button>
        </div>
      </section>

      <!-- Results Section -->
      <section class="results-section" id="resultsSection" style="display:none;">
        <div class="results-header">
          <h2>Votre séance d'entraînement</h2>
          <button onclick="telechargerPDF()" class="btn-download">📥 Télécharger PDF</button>
        </div>
        
        <div id="result" class="result-container"></div>

        <button onclick="genererSeance()" class="btn-new-session">
          🔄 Générer une nouvelle séance
        </button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 Handball Planner | Créé pour les coachs passionnés 🏐</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
